<text x="58" y="132" font-family="Arial, sans-serif" font-size="13" font-weight="800" fill="#D8F3E3" text-anchor="start">❤  Quran Verse</text>
<text x="215" y="215" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#fff" text-anchor="middle">وَمَا تُنفِقُوا مِنْ خَيْرٍ فَلِأَنفُسِكُمْ</text>
<text x="58" y="284" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#fff" text-anchor="start">And whatever good you do — it is for</text>
<text x="58" y="308" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#fff" text-anchor="start">yourselves; and whatever you do of good</text>
<text x="58" y="332" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#fff" text-anchor="start">it is against yourselves.</text>
<text x="58" y="356" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#fff" text-anchor="start">(Quran 2:279)</text>
<line x1="58" y1="405" x2="372" y2="405" stroke="#D8F3E3" opacity="0.35"/>
<text x="58" y="448" font-family="Arial, sans-serif" font-size="15" font-weight="900" fill="#D6A437" text-anchor="start">Reflection</text>
<text x="58" y="482" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#fff" text-anchor="start">Your small, consistent pledge today</text>
<text x="58" y="505" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#fff" text-anchor="start">can be the reason a family eats,</text>
<text x="58" y="528" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#fff" text-anchor="start">drinks, and survives.</text>
<text x="58" y="551" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#fff" text-anchor="start"></text>
<text x="58" y="574" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#fff" text-anchor="start">May Allah accept from us all.</text>
